name: Build Flutter macOS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build Flutter macOS release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Get Flutter dependencies
        working-directory: apps/abyssl_flutter
        shell: bash
        run: |
          set -o pipefail
          flutter pub get 2>&1 \
            | bash ../../scripts/filter-flutter-pub-get-output.sh

      - name: Derive build version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "${GITHUB_ENV}"
          fi
          echo "BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "${GITHUB_ENV}"

      - name: Analyze
        working-directory: apps/abyssl_flutter
        run: flutter analyze --no-pub

      - name: Test
        working-directory: apps/abyssl_flutter
        run: flutter test --no-pub

      - name: Build Flutter macOS release
        run: bash scripts/build-macos-release.sh

      - name: Generate signed Sparkle appcast
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${SPARKLE_PRIVATE_KEY}" ]]; then
            echo "SPARKLE_PRIVATE_KEY is required for signed update releases." >&2
            exit 1
          fi
          sparkle_tool="$(find apps/abyssl_flutter/build/macos -type f -path '*/Sparkle/bin/generate_appcast' -print -quit)"
          if [[ -z "${sparkle_tool}" ]]; then
            echo "Sparkle generate_appcast tool was not found." >&2
            exit 1
          fi
          printf '%s' "${SPARKLE_PRIVATE_KEY}" \
            | "${sparkle_tool}" \
                --ed-key-file - \
                --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/" \
                --link "https://chardonnay.github.io/AbyssL/" \
                --maximum-versions 1 \
                -o appcast.xml \
                dist

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              dist/abyssl_flutter-macos-release.zip \
              dist/appcast.xml \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              dist/abyssl_flutter-macos-release.zip \
              dist/appcast.xml \
              --verify-tag \
              --generate-notes \
              --title "AbyssL ${APP_VERSION}"
          fi

      - name: Upload macOS release artifact
        uses: actions/upload-artifact@v7
        with:
          name: abyssl_flutter-macos-release
          path: |
            dist/abyssl_flutter-macos-release.zip
            dist/appcast.xml
          if-no-files-found: error
