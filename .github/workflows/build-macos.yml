name: Build macOS Apple Silicon

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-macos-arm64:
    name: Build macOS arm64 binary and DMG
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Swift toolchain
        run: swift --version

      - name: Derive build version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "APP_VERSION=0.0.0" >> "$GITHUB_ENV"
          fi
          echo "BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Build binary and DMG
        run: bash scripts/build-macos-release.sh

      - name: Upload macOS release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: AbyssLTranslator-macos-arm64
          path: |
            dist/AbyssLTranslator-macos-arm64-binary.tar.gz
            dist/AbyssLTranslator-macos-arm64.dmg
          if-no-files-found: error
