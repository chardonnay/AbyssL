name: Build Flutter macOS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-macos:
    name: Build Flutter macOS release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Get Flutter dependencies
        working-directory: apps/abyssl_flutter
        shell: bash
        run: |
          set -o pipefail
          flutter pub get 2>&1 \
            | bash ../../scripts/filter-flutter-pub-get-output.sh

      - name: Derive build version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "${GITHUB_ENV}"
          fi
          echo "BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "${GITHUB_ENV}"

      - name: Analyze
        working-directory: apps/abyssl_flutter
        run: flutter analyze --no-pub

      - name: Test
        working-directory: apps/abyssl_flutter
        run: flutter test --no-pub

      - name: Build Flutter macOS release
        run: bash scripts/build-macos-release.sh

      - name: Upload macOS release artifact
        uses: actions/upload-artifact@v7
        with:
          name: abyssl_flutter-macos-release
          path: dist/abyssl_flutter-macos-release.zip
          if-no-files-found: error
